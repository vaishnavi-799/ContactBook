<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
.contact{display:flex;justify-content:space-between;padding:15px;border-bottom:1px solid #eee}
.icon-btn{background:#f2f2f2;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.floating-btn{position:fixed;bottom:20px;right:20px;background:#00c853;color:white;border-radius:50%;width:60px;height:60px;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<input id="search" class="form-control m-2" placeholder="Search" onkeyup="searchContact()">

<div id="list"></div>

<div class="floating-btn" data-bs-toggle="modal" data-bs-target="#modal">
<i class="fa-solid fa-plus"></i>
</div>

<div class="modal fade" id="modal">
<div class="modal-dialog">
<div class="modal-content p-3">
<input id="name" class="form-control mb-2" placeholder="Name">
<input id="phone" class="form-control mb-2" placeholder="Phone">
<select id="category" class="form-control mb-2">
<option>Family</option><option>Friends</option><option>Work</option>
</select>
<button onclick="addContact()" class="btn btn-success">Save</button>
</div>
</div>
</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
