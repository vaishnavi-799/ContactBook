<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

/* Header */

.header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:15px;
    font-size:24px;
    font-weight:bold;
}

/* Search */

.search-box{
    margin:20px;
}

/* Contact List */

#list{
    margin:20px;
}

.contact{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:white;
    padding:15px;
    margin-bottom:12px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* Action Buttons */

.icon-btn{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#e9ecef;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

.icon-btn:hover{
    background:#0d6efd;
    color:white;
}

/* Floating Button */

.floating-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    width:60px;
    height:60px;
    background:#198754;
    color:white;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

/* Modal */

.modal-content{
    border-radius:10px;
}

</style>

</head>

<body>

<div class="header">
    <i class="fa-solid fa-address-book"></i>
    Contact Manager
</div>

<div class="search-box">
    <input
        id="search"
        class="form-control"
        placeholder="Search Contacts"
        onkeyup="searchContact()">
</div>

<div id="list"></div>

<div class="floating-btn"
     data-bs-toggle="modal"
     data-bs-target="#modal">

<i class="fa-solid fa-plus"></i>

</div>

<div class="modal fade" id="modal">

<div class="modal-dialog">

<div class="modal-content p-3">

<h4 class="mb-3">Add Contact</h4>

<input
id="name"
class="form-control mb-2"
placeholder="Name">

<input
id="phone"
class="form-control mb-2"
placeholder="Phone">

<select
id="category"
class="form-select mb-3">

<option>Family</option>
<option>Friends</option>
<option>Work</option>

</select>

<button
onclick="addContact()"
class="btn btn-success w-100">

Save Contact

</button>

</div>

</div>

</div>

<script src="app.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
