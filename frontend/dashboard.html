<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
    background:linear-gradient(135deg,#eef2ff,#f8f9fa);
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    min-height:100vh;
}

/* Header */

.header{
    background:linear-gradient(90deg,#2563eb,#4f46e5);
    color:white;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.header i{
    margin-right:10px;
}

/* Search */

.search-box{
    max-width:650px;
    margin:30px auto;
}

.search-box input{
    border:none;
    border-radius:50px;
    padding:14px 22px;
    font-size:16px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.search-box input:focus{
    box-shadow:0 0 0 .2rem rgba(13,110,253,.2);
}

/* Contact List */

#list{
    max-width:700px;
    margin:auto;
    padding:10px;
}

/* Contact Card */

.contact{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:white;
    padding:18px 20px;
    margin-bottom:18px;
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    transition:.3s;
    border-left:5px solid #2563eb;
}

.contact:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 30px rgba(0,0,0,.15);
}

/* Contact Details */

.contact h5{
    margin:0;
    font-weight:600;
    color:#1f2937;
}

.contact p{
    margin:4px 0 0;
    color:#6b7280;
    font-size:14px;
}

/* Action Buttons */

.icon-btn{
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    background:#eef4ff;
    color:#2563eb;
    transition:.3s;
    font-size:18px;
}

.icon-btn:hover{
    background:#2563eb;
    color:white;
    transform:scale(1.1);
}

/* Floating Button */

.floating-btn{
    position:fixed;
    right:25px;
    bottom:25px;
    width:65px;
    height:65px;
    border-radius:50%;
    background:linear-gradient(135deg,#10b981,#059669);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:24px;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(16,185,129,.4);
    transition:.3s;
}

.floating-btn:hover{
    transform:rotate(90deg) scale(1.08);
}

/* Modal */

.modal-content{
    border:none;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    padding:10px;
}

.modal h4{
    text-align:center;
    font-weight:700;
    color:#2563eb;
}

.modal input,
.modal select{
    border-radius:12px;
    padding:12px;
    border:1px solid #d1d5db;
}

.modal input:focus,
.modal select:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 .2rem rgba(37,99,235,.15);
}

.btn-success{
    border-radius:12px;
    padding:12px;
    font-weight:600;
    background:linear-gradient(90deg,#497ff4,#2563eb);
    border:none;
}

.btn-success:hover{
    background:linear-gradient(90deg,#497ff4,#2563eb);
}
</style>

</head>

<body>

<div class="header">
    <i class="fa-solid fa-address-book"></i>
    Contact Manager
</div>

<div class="search-box">
    <input
        id="search"
        class="form-control"
        placeholder="Search Contacts"
        onkeyup="searchContact()">
</div>

<div id="list"></div>

<div class="floating-btn"
     data-bs-toggle="modal"
     data-bs-target="#modal">

<i class="fa-solid fa-plus"></i>

</div>

<div class="modal fade" id="modal">

<div class="modal-dialog">

<div class="modal-content p-3">

<h4 class="mb-3">Add Contact</h4>

<input
id="name"
class="form-control mb-2"
placeholder="Name">

<input
id="phone"
class="form-control mb-2"
placeholder="Phone">

<select
id="category"
class="form-select mb-3">

<option>Family</option>
<option>Friends</option>
<option>Work</option>

</select>

<button
onclick="addContact()"
class="btn btn-success w-100">

Save Contact

</button>

</div>

</div>

</div>

<script src="app.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
